<!DOCTYPE html>
<html>
    <head>
        <title>Student Login</title>
    </head>

    <body>

        <h2>Student Login</h2>

        <form action="UserServlet"
              method="POST">

            <input type="hidden"
                   name="action"
                   value="login">

            Matric No:
            <input type="text"
                   name="matricNo"
                   required>

            <br><br>

            Password:
            <input type="password"
                   name="password"
                   required>

            <br><br>

            <input type="submit"
                   value="Login">

        </form>

        <br>

        <a href="register.html">Create New Account</a>

    </body>
</html>
